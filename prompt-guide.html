<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=index.html#text">
<title>복사 문장으로 이동</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  min-height: 100vh;
  margin: 0;
  display: grid;
  place-items: center;
  padding: 24px;
  font-family: 'Noto Sans KR', sans-serif;
  color: #172033;
  background: #f7fafc;
  text-align: center;
}
.box {
  width: min(520px, 100%);
  padding: 28px;
  border: 1px solid #dbe3ec;
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 1px 3px rgba(15, 23, 42, .10), 0 12px 28px rgba(15, 23, 42, .07);
}
h1 { margin: 0 0 10px; font-size: 1.65rem; line-height: 1.35; }
p { margin: 0 0 18px; color: #64748b; line-height: 1.7; }
a {
  display: inline-flex;
  min-height: 44px;
  align-items: center;
  justify-content: center;
  padding: 9px 16px;
  border-radius: 999px;
  background: #0f8b8d;
  color: #fff;
  font-weight: 900;
  text-decoration: none;
}
</style>
</head>
<body>
  <main class="box">
    <h1>복사 문장은 수업 진행판에 있습니다</h1>
    <p>프롬프트 자료를 한 화면으로 통합했습니다. 자동으로 이동하지 않으면 아래 버튼을 눌러주세요.</p>
    <a href="index.html#text">복사 문장 열기</a>
  </main>
</body>
</html>
