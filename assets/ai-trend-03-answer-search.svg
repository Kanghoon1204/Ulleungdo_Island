<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">AI answer search reference visual</title>
  <desc id="desc">A traveler asks a natural language question and receives a structured answer.</desc>
  <rect width="960" height="540" fill="#f4fbfa"/>
  <rect x="70" y="58" width="820" height="424" rx="30" fill="#fff" stroke="#bfe6e1" stroke-width="3"/>
  <text x="104" y="118" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#171412">Search becomes a conversation</text>
  <rect x="116" y="166" width="728" height="72" rx="36" fill="#fffaf4" stroke="#eadfd4" stroke-width="3"/>
  <circle cx="154" cy="202" r="14" fill="none" stroke="#0d9488" stroke-width="6"/>
  <path d="M164 212 l20 20" stroke="#0d9488" stroke-width="6" stroke-linecap="round"/>
  <text x="206" y="210" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#171412">2-day Ulleungdo trip for parents?</text>
  <g transform="translate(118 282)">
    <rect x="0" y="0" width="216" height="126" rx="20" fill="#fff1e9" stroke="#ea580c" stroke-width="3"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#171412">Route</text>
    <text x="24" y="78" font-family="Arial, sans-serif" font-size="17" fill="#4b4540">Port - food - view</text>
    <rect x="256" y="0" width="216" height="126" rx="20" fill="#e6f5f3" stroke="#0d9488" stroke-width="3"/>
    <text x="280" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#171412">FAQ</text>
    <text x="280" y="78" font-family="Arial, sans-serif" font-size="17" fill="#4b4540">Ferry, weather, booking</text>
    <rect x="512" y="0" width="216" height="126" rx="20" fill="#fef6dc" stroke="#eab308" stroke-width="3"/>
    <text x="536" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#171412">Check</text>
    <text x="536" y="78" font-family="Arial, sans-serif" font-size="17" fill="#4b4540">Hours and prices</text>
  </g>
</svg>
