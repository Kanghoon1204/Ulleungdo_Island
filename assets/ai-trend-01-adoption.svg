<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Generative AI adoption reference visual</title>
  <desc id="desc">A simple dashboard showing generative AI moving from experts to everyday users.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#e6f5f3"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#g)"/>
  <rect x="66" y="58" width="828" height="424" rx="28" fill="#ffffff" stroke="#eadfd4" stroke-width="3"/>
  <text x="94" y="116" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#171412">Generative AI moves into daily work</text>
  <text x="94" y="154" font-family="Arial, sans-serif" font-size="18" fill="#6b6560">From early users to local businesses, teams, and customers</text>
  <g transform="translate(116 204)">
    <rect x="0" y="140" width="92" height="92" rx="18" fill="#fff1e9" stroke="#ea580c" stroke-width="3"/>
    <rect x="126" y="104" width="92" height="128" rx="18" fill="#fef6dc" stroke="#eab308" stroke-width="3"/>
    <rect x="252" y="62" width="92" height="170" rx="18" fill="#e6f5f3" stroke="#0d9488" stroke-width="3"/>
    <rect x="378" y="16" width="92" height="216" rx="18" fill="#eaf2ff" stroke="#2563eb" stroke-width="3"/>
    <path d="M32 120 C150 80 254 42 432 0" fill="none" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
    <path d="M432 0 l-22 8 l9 20 z" fill="#ea580c"/>
    <text x="7" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#171412">Experts</text>
    <text x="116" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#171412">Teams</text>
    <text x="242" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#171412">Shops</text>
    <text x="365" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#171412">Visitors</text>
  </g>
  <g transform="translate(650 210)">
    <rect x="0" y="0" width="150" height="150" rx="30" fill="#0d9488"/>
    <path d="M42 94 c34 34 86 10 71-34 c-9-26-50-29-64-8 c-17 25 14 50 37 33" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <text x="-30" y="204" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0a6b62">Prompt to output</text>
  </g>
</svg>
