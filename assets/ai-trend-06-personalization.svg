<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Personalized content reference visual</title>
  <desc id="desc">One tourism source becomes messages for different visitor types.</desc>
  <rect width="960" height="540" fill="#fffaf4"/>
  <rect x="68" y="58" width="824" height="424" rx="30" fill="#fff" stroke="#eadfd4" stroke-width="3"/>
  <text x="104" y="118" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#171412">One place, different messages</text>
  <g transform="translate(116 190)" font-family="Arial, sans-serif">
    <rect x="0" y="70" width="190" height="116" rx="20" fill="#0d9488"/>
    <text x="34" y="122" font-size="23" font-weight="700" fill="#fff">Local info</text>
    <text x="28" y="154" font-size="16" fill="#dff8f6">menu, place, booking</text>
    <path d="M218 128 H290" stroke="#c9b6a2" stroke-width="7" stroke-linecap="round"/>
    <path d="M290 128 l-24-18 v36 z" fill="#c9b6a2"/>
    <rect x="332" y="0" width="170" height="82" rx="18" fill="#fff1e9" stroke="#ea580c" stroke-width="3"/>
    <text x="372" y="36" font-size="19" font-weight="700" fill="#171412">Family</text>
    <text x="358" y="62" font-size="14" fill="#6b6560">safe, easy route</text>
    <rect x="532" y="0" width="170" height="82" rx="18" fill="#e6f5f3" stroke="#0d9488" stroke-width="3"/>
    <text x="574" y="36" font-size="19" font-weight="700" fill="#171412">Global</text>
    <text x="562" y="62" font-size="14" fill="#6b6560">simple English</text>
    <rect x="332" y="132" width="170" height="82" rx="18" fill="#fef6dc" stroke="#eab308" stroke-width="3"/>
    <text x="370" y="168" font-size="19" font-weight="700" fill="#171412">Hikers</text>
    <text x="360" y="194" font-size="14" fill="#6b6560">time, gear, safety</text>
    <rect x="532" y="132" width="170" height="82" rx="18" fill="#eaf2ff" stroke="#2563eb" stroke-width="3"/>
    <text x="570" y="168" font-size="19" font-weight="700" fill="#171412">Rainy day</text>
    <text x="560" y="194" font-size="14" fill="#6b6560">indoor options</text>
  </g>
</svg>
